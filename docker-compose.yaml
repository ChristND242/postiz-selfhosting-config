services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    environment:
      MAIN_URL: "http://localhost:5000"
      FRONTEND_URL: "http://localhost:5000"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:5000/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"

      JWT_SECRET: "ton-secret-key-for-jwt"

      DATABASE_URL: "postgresql://postiz-user:postiz-password@postiz-postgres:5432/postiz-db-local"
      REDIS_URL: "redis://postiz-redis:6379"

      TEMPORAL_ADDRESS: "temporal:7233"
      RUN_CRON: "true"

      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false" # Définis cette option sur « true » pour désactiver l'inscription des utilisateurs et n'autoriser que les comptes créés par toi même.

      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"

      # Email configuration (Exemple Gmail : remplace par tes identifiants et les paramètres de ton fournisseur)
      EMAIL_PROVIDER: "gmail"
      EMAIL_HOST: "smtp.gmail.com"
      EMAIL_PORT: "587" # 587 pour TLS, 465 pour SSL
      EMAIL_SECURE: "false" # false pour TLS, true pour SSL
      EMAIL_USER: "user@gmail.com"
      EMAIL_PASS: "app-password-or-email-password"
      EMAIL_FROM_NAME: "name"
      EMAIL_FROM_ADDRESS: "user@gmail.com"

      # === Social Media API (ajoute les clés API de tes plateformes préférées pour les connecter à Postiz)
      # X_API_KEY: ''
      # X_API_SECRET: ''
      # LINKEDIN_CLIENT_ID: ''
      # LINKEDIN_CLIENT_SECRET: ''
      # REDDIT_CLIENT_ID: ''
      # REDDIT_CLIENT_SECRET: ''
      # GITHUB_CLIENT_ID: ''
      # GITHUB_CLIENT_SECRET: ''
      # BEEHIIVE_API_KEY: ''
      # BEEHIIVE_PUBLICATION_ID: ''
      # THREADS_APP_ID: ''
      # THREADS_APP_SECRET: ''
      # FACEBOOK_APP_ID: ''
      # FACEBOOK_APP_SECRET: ''
      # YOUTUBE_CLIENT_ID: ''
      # YOUTUBE_CLIENT_SECRET: ''
      # TIKTOK_CLIENT_ID: ''
      # TIKTOK_CLIENT_SECRET: ''
      # PINTEREST_CLIENT_ID: ''
      # PINTEREST_CLIENT_SECRET: ''
      # DRIBBBLE_CLIENT_ID: ''
      # DRIBBBLE_CLIENT_SECRET: ''
      # DISCORD_CLIENT_ID: ''
      # DISCORD_CLIENT_SECRET: ''
      # DISCORD_BOT_TOKEN_ID: ''
      # SLACK_ID: ''
      # SLACK_SECRET: ''
      # SLACK_SIGNING_SECRET: ''
      # MASTODON_URL: 'https://mastodon.social'
      # MASTODON_CLIENT_ID: ''
      # MASTODON_CLIENT_SECRET: ''

      # === Chrome Extension Settings (ajoute l'ID de ton extension Chrome pour activer les fonctionnalités d'intégration)
      # EXTENSION_ID: 'icpokdlcikdmemjkeoojhocmhmehpaia'

      # === OAuth & Authentik Settings (ajoute les paramètres de ton fournisseur OAuth pour permettre aux utilisateurs de se connecter avec leurs comptes existants)
      # NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME: 'Authentik'
      # NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL: 'https://raw.githubusercontent.com/walkxcode/dashboard-icons/master/png/authentik.png'
      # POSTIZ_GENERIC_OAUTH: 'false'
      # POSTIZ_OAUTH_URL: 'https://auth.example.com'
      # POSTIZ_OAUTH_AUTH_URL: 'https://auth.example.com/application/o/authorize'
      # POSTIZ_OAUTH_TOKEN_URL: 'https://auth.example.com/application/o/token'
      # POSTIZ_OAUTH_USERINFO_URL: 'https://authentik.example.com/application/o/userinfo'
      # POSTIZ_OAUTH_CLIENT_ID: ''
      # POSTIZ_OAUTH_CLIENT_SECRET: ''
      # POSTIZ_OAUTH_SCOPE: "openid profile email"  # Optional: uncomment to override default scope

      # === Sentry

      # NEXT_PUBLIC_SENTRY_DSN: 'http://spotlight:8969/stream'
      # SENTRY_SPOTLIGHT: '1'

      # === Misc Settings
      # OPENAI_API_KEY: ''
      # NEXT_PUBLIC_DISCORD_SUPPORT: ''
      # NEXT_PUBLIC_POLOTNO: ''
      # API_LIMIT: 30

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "5000:5000"
    networks:
      - postiz-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started

  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: "postiz-user"
      POSTGRES_PASSWORD: "postiz-password"
      POSTGRES_DB: "postiz-db-local"
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz-user -d postiz-db-local"]
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2
    restart: always
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  temporal-postgresql:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: "temporal"
      POSTGRES_PASSWORD: "temporal"
    volumes:
      - temporal-postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    restart: always
    environment:
      discovery.type: "single-node"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      xpack.security.enabled: "false"
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: "512mb"
      cluster.routing.allocation.disk.watermark.high: "256mb"
      cluster.routing.allocation.disk.watermark.flood_stage: "128mb"
    networks:
      - postiz-network
    expose:
      - "9200"

  temporal:
    image: temporalio/auto-setup:1.28.1
    restart: always
    depends_on:
      temporal-postgresql:
        condition: service_healthy
      temporal-elasticsearch:
        condition: service_started
    environment:
      DB: "postgres12"
      DB_PORT: "5432"
      POSTGRES_USER: "temporal"
      POSTGRES_PWD: "temporal"
      POSTGRES_SEEDS: "temporal-postgresql"
      DYNAMIC_CONFIG_FILE_PATH: "config/dynamicconfig/development-sql.yaml"
      ENABLE_ES: "true"
      ES_SEEDS: "temporal-elasticsearch"
      ES_VERSION: "v7"
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_ADDRESS: "temporal:7233"
      TEMPORAL_CLI_ADDRESS: "temporal:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    ports:
      - "7233:7233"
    networks:
      - postiz-network

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: always
    environment:
      TEMPORAL_ADDRESS: "temporal:7233"
    ports:
      - "8080:8080"
    networks:
      - postiz-network
    depends_on:
      temporal:
        condition: service_started

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-postgres-volume:

networks:
  postiz-network:
    driver: bridge